<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPSTEIN ISLAND • PROTOCOL</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --accent: #c27c15;
            --neon-green: #00ff41;
            --neon-red: #ff0033;
            --neon-yellow: #ffd700;
            --bg: #0a0a0a;
        }
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: radial-gradient(circle at center, #1a001a 0%, #000 80%);
            color: var(--neon-green);
            font-family: 'VT323', monospace;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(transparent 0px, rgba(255,0,51,0.04) 1px, transparent 4px);
            pointer-events: none;
            animation: scan 10s linear infinite;
            z-index: 0;
        }
        @keyframes scan { 0%{background-position:0 0} 100%{background-position:0 500px} }

        /* Top Bar - exact style from your code */
        #top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 68px;
            background: rgba(10,10,10,0.98);
            border-bottom: 4px solid var(--neon-red);
            display: flex;
            align-items: center;
            padding: 0 25px;
            z-index: 999;
            box-shadow: 0 0 30px var(--neon-red);
        }
        #logo {
            font-family: 'Press Start 2P', cursive;
            font-size: 26px;
            color: var(--neon-yellow);
            text-shadow: 0 0 20px var(--neon-yellow);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .top-nav {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .nav-tab {
            padding: 8px 18px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-tab:hover, .nav-tab.active {
            color: var(--neon-yellow);
            text-shadow: 0 0 10px var(--neon-yellow);
        }
        #live-counter {
            background: rgba(0,0,0,0.6);
            border: 2px solid var(--neon-green);
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Game Container */
        #main-container {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: 960px;
            max-width: 96vw;
            background: #111;
            border: 5px solid var(--neon-red);
            border-radius: 12px;
            box-shadow: 0 0 70px rgba(255,0,51,0.7);
            overflow: hidden;
        }

        #epstein-area {
            padding: 40px 30px 20px;
            background: linear-gradient(#1a001a, #000);
            position: relative;
        }
        #epstein {
            width: 290px; height: 290px;
            margin: 0 auto;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Jeffrey_Epstein_mugshot.jpg/800px-Jeffrey_Epstein_mugshot.jpg') center/cover;
            border-radius: 50%;
            border: 10px solid var(--neon-red);
            box-shadow: 0 0 60px var(--neon-red), inset 0 0 50px rgba(255,255,255,0.2);
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.68,-0.55,0.27,1.55);
        }
        #epstein:active { transform: scale(0.82) rotate(-8deg); }

        .little-epstein {
            position: absolute;
            width: 42px; height: 42px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Jeffrey_Epstein_mugshot.jpg/800px-Jeffrey_Epstein_mugshot.jpg') center/cover;
            border-radius: 50%;
            border: 3px solid var(--neon-yellow);
            box-shadow: 0 0 20px var(--neon-yellow);
            animation: wiggle 1.6s infinite alternate;
        }
        @keyframes wiggle { from {transform:rotate(-20deg) scale(0.9);} to {transform:rotate(20deg) scale(1.2);} }

        #display {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.75);
            border-top: 3px solid var(--neon-green);
            border-bottom: 3px solid var(--neon-green);
        }
        #count {
            font-family: 'Press Start 2P', cursive;
            font-size: 4.5rem;
            color: var(--neon-yellow);
            text-shadow: 0 0 30px var(--neon-yellow);
        }
        #eps { font-size: 1.8rem; color: var(--neon-green); }

        #shop {
            padding: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            background: #0a0a0a;
        }
        .shop-item {
            background: #1a1a1a;
            border: 4px solid var(--neon-green);
            border-radius: 10px;
            padding: 18px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .shop-item:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: var(--neon-yellow);
            box-shadow: 0 0 35px var(--neon-yellow);
        }
        .shop-item.affordable { animation: affordablePulse 1.8s infinite; }
        @keyframes affordablePulse { 0%,100% {box-shadow:0 0 25px var(--neon-yellow);} 50% {box-shadow:0 0 50px var(--neon-yellow);} }

        .shop-item .emoji { font-size: 52px; margin-bottom: 10px; }
        .shop-item .name { font-size: 19px; color: white; }
        .shop-item .cost { color: var(--neon-yellow); font-size: 22px; margin: 6px 0; }
        .shop-item .owned { position:absolute; top:12px; right:12px; background:rgba(0,255,65,0.25); color:var(--neon-green); padding:2px 12px; border-radius:20px; font-size:14px; }

        #stats {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(10,10,10,0.95);
            border: 3px solid var(--neon-green);
            padding: 16px 22px;
            border-radius: 8px;
            font-size: 16px;
            box-shadow: 0 0 30px var(--neon-green);
        }

        .particle { position:absolute; font-size:28px; pointer-events:none; animation:flyUp 1.5s forwards; z-index:999; }
        @keyframes flyUp {0%{transform:translateY(0);opacity:1}100%{transform:translateY(-160px);opacity:0}}

        .golden {
            position:absolute; width:78px; height:78px;
            background:radial-gradient(circle,#ffd700,#ff5500);
            border-radius:50%; border:7px solid white;
            box-shadow:0 0 70px #ffd700;
            cursor:pointer; animation:goldenPulse 0.8s infinite alternate;
        }
        @keyframes goldenPulse { from{transform:scale(1)} to{transform:scale(1.4)} }

        .warning {
            position:fixed; bottom:25px; left:25px; font-size:14px; color:#ffaa00;
            background:rgba(0,0,0,0.7); padding:8px 16px; border:1px solid #ffaa00;
        }

        #admin-panel {
            display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            width:480px; background:#000; border:6px double var(--neon-red);
            padding:30px; z-index:99999; color:var(--neon-green);
            box-shadow:0 0 90px var(--neon-red);
        }
        #admin-panel h2 { color:var(--neon-yellow); text-align:center; font-size:32px; margin-bottom:20px; }
    </style>
</head>
<body>

    <div id="top-bar">
        <div id="logo" onclick="location.reload()"><i class="fas fa-skull-crossbones"></i> EPSTEIN ISLAND</div>
        
        <div class="top-nav">
            <div class="nav-tab active"><i class="fas fa-house"></i> <span>Home</span></div>
            <div class="nav-tab"><i class="fas fa-book-open"></i> <span>Logs</span></div>
            <div class="nav-tab"><i class="fas fa-comments"></i> <span>Chat</span></div>
            <div class="nav-tab"><i class="fas fa-gear"></i> <span>Settings</span></div>
        </div>
        
        <div id="live-counter">
            <span style="color:var(--neon-green)">ONLINE:</span>
            <span id="liveCounterValue" style="color:var(--neon-yellow)">13,337</span>
        </div>
    </div>

    <div id="main-container">
        <div id="epstein-area">
            <div id="epstein"></div>
        </div>
        
        <div id="display">
            <div id="count">0</div>
            <div id="eps">0.0 Epstein's / second</div>
        </div>
        
        <div id="shop"></div>
    </div>

    <div id="stats">
        CLICKS: <span id="totalClicked">0</span><br>
        EPSTEINS CLICKED: <span id="epsteinsClicked">0</span>
    </div>

    <div class="warning">
        CTRL + SHIFT + A = ADMIN TERMINAL<br>
        The little ones are always watching
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel">
        <h2><i class="fas fa-crown"></i> ADMIN TERMINAL</h2>
        <input type="number" id="admin-set-amount" value="1000000" style="width:100%;padding:12px;background:#222;border:2px solid var(--neon-green);color:white;font-size:18px;margin-bottom:10px;">
        <button onclick="adminSetEpsteins()" style="width:100%;padding:14px;margin:8px 0;background:transparent;border:2px solid var(--neon-green);color:var(--neon-green);font-size:18px;cursor:pointer;">INJECT EPSTEINS</button>
        
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:15px;">
            <button onclick="adminGiveMillion()" style="padding:12px;background:transparent;border:2px solid var(--neon-green);color:var(--neon-green);">+1,000,000</button>
            <button onclick="adminMaxBuildings()" style="padding:12px;background:transparent;border:2px solid var(--neon-green);color:var(--neon-green);">MAX BUILDINGS</button>
            <button onclick="adminClearLittles()" style="padding:12px;background:transparent;border:2px solid var(--neon-green);color:var(--neon-green);">CLEAR LITTLES</button>
            <button onclick="adminResetGame()" style="padding:12px;background:transparent;border:2px solid #f00;color:#f00;">NUKE SAVE</button>
        </div>
    </div>

    <script>
        let epsteins = 0, totalEpsteins = 0, clickValue = 1, epsteinsPerSecond = 0;
        let totalClicked = 0, epsteinsClicked = 0, goldenChance = 0.06;
        
        let buildings = [
            {name:"Little Black Book", baseCost:15, cost:15, production:0.8, owned:0, emoji:"📖"},
            {name:"Lolita Express", baseCost:100, cost:100, production:6, owned:0, emoji:"✈️"},
            {name:"Private Island", baseCost:550, cost:550, production:30, owned:0, emoji:"🏝️"},
            {name:"Mossad Agent", baseCost:2200, cost:2200, production:110, owned:0, emoji:"🕵️"},
            {name:"Elite Client", baseCost:12000, cost:12000, production:520, owned:0, emoji:"💼"},
            {name:"Hidden Camera Network", baseCost:65000, cost:65000, production:2800, owned:0, emoji:"📹"}
        ];
        
        const epsteinEl = document.getElementById('epstein');
        const countEl = document.getElementById('count');
        const epsEl = document.getElementById('eps');
        const shopEl = document.getElementById('shop');
        const totalClickedEl = document.getElementById('totalClicked');
        const epsteinsClickedEl = document.getElementById('epsteinsClicked');
        
        let littleEpsteins = [];
        
        function createShop() {
            shopEl.innerHTML = '';
            buildings.forEach((b,i) => {
                const div = document.createElement('div');
                div.className = 'shop-item';
                div.innerHTML = `
                    <div class="emoji">${b.emoji}</div>
                    <div class="name">${b.name}</div>
                    <div class="cost" id="cost-${i}">$${Math.floor(b.cost)}</div>
                    <div class="owned" id="owned-${i}">×${b.owned}</div>
                `;
                div.onclick = () => buyBuilding(i);
                shopEl.appendChild(div);
            });
        }
        
        function updateShop() {
            buildings.forEach((b,i) => {
                const costEl = document.getElementById(`cost-${i}`);
                const ownedEl = document.getElementById(`owned-${i}`);
                if(costEl) costEl.textContent = '$' + Math.floor(b.cost).toLocaleString();
                if(ownedEl) ownedEl.textContent = '×' + b.owned;
                const item = shopEl.children[i];
                if(item) item.classList.toggle('affordable', epsteins >= b.cost);
            });
        }
        
        function buyBuilding(i) {
            const b = buildings[i];
            if(epsteins >= b.cost){
                epsteins -= b.cost;
                b.owned++;
                b.cost = Math.floor(b.baseCost * Math.pow(1.15, b.owned));
                spawnLittleEpstein();
                calculateEPS();
                updateDisplay();
                updateShop();
                createParticle(epsteinEl, `+${b.emoji}`, '#ffd700');
            }
        }
        
        function spawnLittleEpstein(){
            const little = document.createElement('div');
            little.className = 'little-epstein';
            little.style.left = (50 + Math.random()*190) + 'px';
            little.style.top = (60 + Math.random()*160) + 'px';
            epsteinEl.appendChild(little);
            littleEpsteins.push(little);
        }
        
        function calculateEPS(){ epsteinsPerSecond = buildings.reduce((a,b)=>a + b.production*b.owned, 0); }
        
        function updateDisplay(){
            countEl.textContent = Math.floor(epsteins).toLocaleString();
            epsEl.textContent = epsteinsPerSecond.toFixed(1) + " Epstein's / second";
            totalClickedEl.textContent = totalClicked.toLocaleString();
            epsteinsClickedEl.textContent = epsteinsClicked.toLocaleString();
        }
        
        function clickEpstein(e){
            epsteins += clickValue; totalEpsteins += clickValue; totalClicked++; epsteinsClicked += clickValue;
            epsteinEl.style.transform = 'scale(0.78) rotate(-10deg)';
            setTimeout(()=>epsteinEl.style.transform='scale(1)', 90);
            
            const rect = epsteinEl.getBoundingClientRect();
            const x = e ? e.clientX : rect.left + rect.width/2;
            const y = e ? e.clientY : rect.top + rect.height/2;
            createParticleAt(x+Math.random()*60-30, y+Math.random()*40-20, `+${clickValue}`, '#ffd700');
            if(Math.random()<0.4) createParticleAt(x+30,y-30,'🕵️','#00ff41');
            updateDisplay();
        }
        
        function createParticleAt(x,y,text,color){
            const p = document.createElement('div');
            p.className='particle';
            p.style.left=x+'px'; p.style.top=y+'px'; p.style.color=color;
            p.textContent = text;
            document.body.appendChild(p);
            setTimeout(()=>p.remove(),1600);
        }
        
        function createParticle(el,text,color){
            const r = el.getBoundingClientRect();
            createParticleAt(r.left+100+Math.random()*90, r.top+90+Math.random()*80, text, color);
        }
        
        function spawnGoldenEpstein(){
            if(Math.random() > goldenChance || document.querySelector('.golden')) return;
            const g = document.createElement('div'); g.className='golden';
            const r = epsteinEl.getBoundingClientRect();
            g.style.left = (r.left + 100 + Math.random()*100)+'px';
            g.style.top = (r.top + 80 + Math.random()*90)+'px';
            document.body.appendChild(g);
            g.onclick = ()=>{ 
                const bonus = Math.floor(epsteins*0.25)+888;
                epsteins += bonus;
                createParticleAt(g.offsetLeft+25, g.offsetTop-50, `+${bonus}!`, '#ffd700');
                g.remove(); updateDisplay();
            };
            setTimeout(()=>g.remove(),6500);
        }
        
        function gameLoop(){
            const now = Date.now();
            if(!window.last) window.last=now;
            epsteins += epsteinsPerSecond * (now-window.last)/1000;
            totalEpsteins += epsteinsPerSecond * (now-window.last)/1000;
            window.last = now;
            updateDisplay(); updateShop();
            requestAnimationFrame(gameLoop);
        }
        
        function saveGame(){
            localStorage.setItem('epsteinIsland', JSON.stringify({
                epsteins, totalEpsteins, clickValue, goldenChance,
                buildings: buildings.map(b=>({owned:b.owned,cost:b.cost})),
                totalClicked, epsteinsClicked
            }));
        }
        
        function loadGame(){
            const s = localStorage.getItem('epsteinIsland');
            if(!s) return;
            const d = JSON.parse(s);
            epsteins = d.epsteins||0; totalEpsteins=d.totalEpsteins||0; clickValue=d.clickValue||1;
            goldenChance = d.goldenChance||0.06; totalClicked=d.totalClicked||0; epsteinsClicked=d.epsteinsClicked||0;
            if(d.buildings) d.buildings.forEach((sb,i)=>{if(buildings[i]){buildings[i].owned=sb.owned||0; buildings[i].cost=sb.cost||buildings[i].baseCost;}});
            calculateEPS();
        }
        
        window.adminSetEpsteins = ()=>{ epsteins += parseFloat(document.getElementById('admin-set-amount').value)||0; updateDisplay(); saveGame(); };
        window.adminGiveMillion = ()=>{ epsteins += 1000000; updateDisplay(); saveGame(); };
        window.adminMaxBuildings = ()=>{ buildings.forEach(b=>{b.owned=50; b.cost=Math.floor(b.baseCost*Math.pow(1.15,50));}); littleEpsteins.forEach(l=>l.remove()); littleEpsteins=[]; buildings.forEach(()=> {for(let i=0;i<9;i++)spawnLittleEpstein();}); calculateEPS(); updateDisplay(); updateShop(); saveGame(); };
        window.adminClearLittles = ()=>{ littleEpsteins.forEach(l=>l.remove()); littleEpsteins=[]; };
        window.adminResetGame = ()=>{ if(confirm('DELETE ALL PROGRESS?')){localStorage.removeItem('epsteinIsland'); location.reload();} };
        
        function init(){
            loadGame();
            createShop();
            calculateEPS();
            updateDisplay();
            updateShop();
            
            buildings.forEach(b=>{ for(let i=0; i<Math.min(b.owned*2,16); i++) spawnLittleEpstein(); });
            
            epsteinEl.addEventListener('click', clickEpstein);
            setInterval(spawnGoldenEpstein, 13500);
            setInterval(saveGame, 7000);
            setInterval(()=>{ if(littleEpsteins.length && Math.random()<0.5){ const l = littleEpsteins[Math.floor(Math.random()*littleEpsteins.length)]; const r=l.getBoundingClientRect(); createParticleAt(r.left+18,r.top+12,'+🕵️','#00ff41'); } }, 2800);
            
            document.addEventListener('keydown', e=>{
                if(e.ctrlKey && e.shiftKey && e.key.toLowerCase()==='a'){
                    const ap = document.getElementById('admin-panel');
                    ap.style.display = ap.style.display==='block' ? 'none' : 'block';
                }
            });
            
            gameLoop();
            setTimeout(()=>{createParticle(epsteinEl, "ISLAND ONLINE", "#ff0033");}, 800);
        }
        
        window.onload = init;
    </script>
</body>
</html>
