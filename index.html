<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VORTX</title>
<style>
  :root {
    --neon: #67e8f9;
    --purple: #c084fc;
    --pink: #f472b6;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    height: 100vh;
    overflow: hidden;
    background: #000;
    color: #eee;
    font-family: system-ui, -apple-system, sans-serif;
    cursor: none;
    position: relative;
  }

  /* Universes */
  .universe {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 2.4s cubic-bezier(0.23,1,0.32,1);
    pointer-events: none;
  }
  .universe.active { opacity: 1; pointer-events: auto; }

  .stars { position: absolute; inset: 0; z-index: 1; }

  /* Planets */
  .planets { position: absolute; inset: 0; z-index: 3; }
  .planet-container {
    position: absolute;
    width: var(--size);
    height: var(--size);
    cursor: pointer;
    transition: transform 0.7s cubic-bezier(0.34,1.56,0.64,1);
  }
  .planet-container:hover { transform: scale(1.4) rotate(12deg); }
  .planet {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 55px rgba(103,232,249,0.7),
                0 0 100px rgba(192,132,252,0.5);
  }

  /* Black Hole - Now Interactive */
  .black-hole {
    position: absolute;
    left: 50%; top: 50%;
    width: 380px; height: 380px;
    transform: translate(-50%, -50%);
    background: url('https://svs.gsfc.nasa.gov/vis/a000000/a001400/a001419/black_hole_accretion_disk.jpg') center/cover;
    border-radius: 50%;
    box-shadow: 0 0 200px #ffaa00, 0 0 400px #ff5500, inset 0 0 120px #111;
    animation: bh-neon 6.5s infinite alternate ease-in-out;
    cursor: pointer;
    transition: transform 0.4s;
  }
  .black-hole:hover { transform: translate(-50%, -50%) scale(1.12); }
  @keyframes bh-neon {
    from { box-shadow: 0 0 160px #ffaa00, 0 0 340px #ff5500; }
    to   { box-shadow: 0 0 240px #ffaa00, 0 0 480px #ff5500; }
  }

  /* Neon Cursor */
  .custom-cursor {
    position: fixed;
    width: 44px; height: 44px;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
  }
  .cursor-core {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #fff, var(--neon), transparent 75%);
    box-shadow: 0 0 45px var(--neon), 0 0 90px var(--purple);
    animation: cursor-pulse 2.2s infinite ease-in-out;
  }
  @keyframes cursor-pulse { 0%,100% {transform:scale(1);} 50% {transform:scale(1.45);} }

  /* Content */
  .content {
    position: relative; z-index: 10;
    height: 100vh;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 0 20px;
    pointer-events: none;
  }
  .content > * { pointer-events: auto; }

  h1 {
    font-size: clamp(5.2rem, 17vw, 13rem);
    font-weight: 900;
    letter-spacing: -0.08em;
    background: linear-gradient(90deg, #67e8f9, #a5b4fc, #c084fc, #f472b6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    background-size: 400% 100%;
    animation: title-neon 10s linear infinite;
    text-shadow: 0 0 90px rgba(103,232,249,0.9);
  }
  @keyframes title-neon { 0% {background-position:0% 50%} 100% {background-position:400% 50%} }

  .subtitle {
    font-size: 1.55rem;
    max-width: 860px;
    opacity: 0.92;
    line-height: 1.85;
    margin: 1rem 0 2.5rem;
  }

  .btn {
    padding: 20px 48px;
    font-size: 1.4rem;
    background: rgba(103,232,249,0.08);
    border: 3px solid var(--neon);
    border-radius: 50px;
    color: white;
    cursor: pointer;
    transition: all 0.5s ease;
    box-shadow: 0 0 40px rgba(103,232,249,0.6);
  }
  .btn:hover {
    background: var(--neon);
    color: #000;
    transform: scale(1.12);
    box-shadow: 0 0 80px #67e8f9;
  }

  /* Planet Info */
  #planet-info {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.97);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .info-box {
    background: rgba(8,10,32,0.98);
    border: 3px solid var(--neon);
    border-radius: 30px;
    padding: 3.2rem 3rem;
    max-width: 700px;
    width: 92%;
    box-shadow: 0 0 140px rgba(103,232,249,0.8);
  }
  .info-box h2 {
    font-size: 3.6rem;
    color: var(--neon);
    margin-bottom: 1.5rem;
    text-shadow: 0 0 40px var(--neon);
  }
  .info-box p { font-size: 1.4rem; line-height: 1.9; }

  .close-btn {
    position: absolute; top: 30px; right: 40px;
    font-size: 3.5rem; color: #777; cursor: pointer;
  }
  .close-btn:hover { color: var(--neon); }

  /* Famous Modal */
  #famous-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.97);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1001;
  }
  .modal-content {
    background: rgba(10,12,35,0.98);
    border-radius: 30px;
    max-width: 960px;
    width: 94%;
    max-height: 92vh;
    overflow-y: auto;
    padding: 3.5rem 3rem;
  }
  .modal-content h2 {
    text-align: center;
    font-size: 3.4rem;
    margin-bottom: 2.5rem;
    color: var(--neon);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
    gap: 1.8rem;
  }
  .legend {
    background: rgba(255,255,255,0.06);
    padding: 1.8rem;
    border-radius: 20px;
    border-left: 8px solid var(--neon);
  }
  .legend h3 { color: var(--purple); margin-bottom: 0.5rem; }

  /* Particles */
  #particles { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
</style>
</head>
<body>

  <!-- Universes -->
  <div class="universe active" id="u1">
    <div class="stars" id="stars1"></div>
    <div class="planets" id="planets"></div>
  </div>
  <div class="universe" id="u2"><div class="stars" id="stars2"></div></div>
  <div class="universe" id="u3"><div class="stars" id="stars3"></div></div>
  <div class="universe" id="u4">
    <div class="stars" id="stars4"></div>
    <div class="black-hole" id="blackhole"></div>
  </div>

  <!-- Particles Container -->
  <div id="particles"></div>

  <!-- Cursor -->
  <div class="custom-cursor" id="cursor"><div class="cursor-core"></div></div>

  <!-- Main Content -->
  <div class="content">
    <h1>VORTX</h1>
    <p class="subtitle">
      Click the void to warp universes<br>
      Click planets for deep dive • Click the black hole for singularity
    </p>
    <button class="btn" id="famous-btn">LEGENDARY ASTRONOMERS &amp; ASTROPHYSICISTS</button>
  </div>

  <!-- Planet Info -->
  <div id="planet-info">
    <div class="info-box">
      <span class="close-btn" onclick="closePlanetInfo()">×</span>
      <h2 id="info-title"></h2>
      <p id="info-desc"></p>
    </div>
  </div>

  <!-- Famous Modal -->
  <div id="famous-modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeFamousModal()" style="float:right;font-size:3.5rem;">×</span>
      <h2>Legends of the Cosmos</h2>
      <div class="grid" id="legends-grid"></div>
    </div>
  </div>

  <!-- Audio -->
  <audio id="ambient" loop autoplay volume="0.25">
    <source src="https://freesound.org/data/previews/612/612095_5674468-lq.mp3" type="audio/mpeg">
  </audio>
  <audio id="whoosh" src="https://freesound.org/data/previews/276/276952_5121236-lq.mp3"></audio>
  <audio id="burst" src="https://freesound.org/data/previews/387/387962_7256635-lq.mp3"></audio>

<script>
// ====================== DATA ======================
const planetData = [
  {id:"mercury", name:"Mercury", size:"58", left:"10%", top:"16%", desc:"Smallest planet. Extreme heat by day, freezing by night. No atmosphere."},
  {id:"venus", name:"Venus", size:"85", left:"27%", top:"67%", desc:"Hottest planet in the Solar System. Toxic atmosphere and retrograde rotation."},
  {id:"earth", name:"Earth", size:"95", left:"41%", top:"23%", desc:"Our living blue home. The only known planet with life."},
  {id:"mars", name:"Mars", size:"72", left:"73%", top:"13%", desc:"The Red Planet. Tallest mountain in the Solar System and ancient water evidence."},
  {id:"jupiter", name:"Jupiter", size:"178", left:"54%", top:"48%", desc:"Largest planet. Gas giant with the Great Red Spot storm."},
  {id:"saturn", name:"Saturn", size:"162", left:"13%", top:"52%", desc:"Iconic ring system made of ice and rock."},
  {id:"uranus", name:"Uranus", size:"105", left:"77%", top:"66%", desc:"Ice giant tilted on its side — extreme seasons."},
  {id:"neptune", name:"Neptune", size:"99", left:"46%", top:"80%", desc:"Windiest planet with supersonic blue storms."}
];

const legends = [
  {name:"Galileo Galilei", years:"1564–1642", note:"First to use a telescope for astronomy. Discovered Jupiter’s moons."},
  {name:"Johannes Kepler", years:"1571–1630", note:"Discovered the three laws of planetary motion."},
  {name:"Isaac Newton", years:"1643–1727", note:"Law of universal gravitation."},
  {name:"Edwin Hubble", years:"1889–1953", note:"Proved the universe is expanding."},
  {name:"Carl Sagan", years:"1934–1996", note:"Cosmos visionary and planetary science pioneer."},
  {name:"Stephen Hawking", years:"1942–2018", note:"Revolutionized black hole physics."},
  {name:"Vera Rubin", years:"1928–2016", note:"Provided key evidence for dark matter."},
  {name:"Cecilia Payne-Gaposchkin", years:"1900–1979", note:"Discovered stars are mostly hydrogen and helium."},
  {name:"Neil deGrasse Tyson", years:"1958–present", note:"Astrophysicist and legendary science communicator."}
];

// ====================== HELPERS ======================
function createStars(id, count) {
  const container = document.getElementById(id);
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    const sz = Math.random() * 3.5 + 0.9;
    s.style.cssText = `position:absolute; background:#fff; border-radius:50%; width:${sz}px; height:${sz}px;
      left:${Math.random()*100}vw; top:${Math.random()*100}vh; opacity:${Math.random()*0.8+0.3};
      box-shadow:0 0 ${sz*3}px #fff; animation:twinkle ${Math.random()*6+4}s infinite alternate;`;
    container.appendChild(s);
  }
}

function createParticles(x, y, color = '#67e8f9', count = 55) {
  const container = document.getElementById('particles');
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    const size = Math.random() * 7 + 4;
    p.style.cssText = `position:absolute; left:${x}px; top:${y}px; width:${size}px; height:${size}px;
      background:${color}; border-radius:50%; pointer-events:none; box-shadow:0 0 15px ${color};`;
    
    const angle = Math.random() * Math.PI * 2;
    const vel = Math.random() * 220 + 100;
    
    p.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${Math.cos(angle)*vel}px, ${Math.sin(angle)*vel}px) scale(0.2)`, opacity: 0 }
    ], { duration: Math.random() * 1100 + 900, easing: 'cubic-bezier(0.25,0.1,0.25,1)' });
    
    container.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

// ====================== PLANETS ======================
function createPlanets() {
  const container = document.getElementById('planets');
  planetData.forEach(p => {
    const div = document.createElement('div');
    div.className = 'planet-container';
    div.style.left = p.left;
    div.style.top = p.top;
    div.style.setProperty('--size', p.size + 'px');
    div.innerHTML = `<img class="planet" src="https://www.solarsystemscope.com/textures/download/2k_${p.id}.jpg" alt="${p.name}">`;

    div.addEventListener('click', (e) => {
      e.stopImmediatePropagation();
      const rect = div.getBoundingClientRect();
      const cx = rect.left + rect.width/2;
      const cy = rect.top + rect.height/2;

      createParticles(cx, cy, '#67e8f9', 65);
      document.getElementById('burst').currentTime = 0;
      document.getElementById('burst').play().catch(()=>{});

      document.getElementById('info-title').textContent = p.name;
      document.getElementById('info-desc').textContent = p.desc;
      document.getElementById('planet-info').style.display = 'flex';
    });
    container.appendChild(div);
  });
}

// ====================== BLACK HOLE INTERACTION ======================
document.getElementById('blackhole').addEventListener('click', (e) => {
  const rect = e.target.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  
  createParticles(cx, cy, '#ffaa00', 90);
  document.getElementById('burst').currentTime = 0;
  document.getElementById('burst').play().catch(()=>{});
  
  alert("🌌 You have entered the singularity...\n\nThe universe thanks you for the journey, stardust.");
});

// ====================== MODALS ======================
function closePlanetInfo() {
  document.getElementById('planet-info').style.display = 'none';
}

function openFamousModal() {
  const grid = document.getElementById('legends-grid');
  grid.innerHTML = '';
  legends.forEach(l => {
    const card = document.createElement('div');
    card.className = 'legend';
    card.innerHTML = `<h3>${l.name}</h3><small>${l.years}</small><p>${l.note}</p>`;
    grid.appendChild(card);
  });
  document.getElementById('famous-modal').style.display = 'flex';
}

function closeFamousModal() {
  document.getElementById('famous-modal').style.display = 'none';
}

// ====================== UNIVERSE CYCLE ======================
let current = 1;
const whoosh = document.getElementById('whoosh');
const ambient = document.getElementById('ambient');
ambient.volume = 0.25;

document.addEventListener('click', (e) => {
  if (e.target.closest('.content') || 
      e.target.closest('#planet-info') || 
      e.target.closest('#famous-modal') ||
      e.target.closest('.planet-container') ||
      e.target.closest('.black-hole')) return;

  whoosh.currentTime = 0;
  whoosh.volume = 0.45;
  whoosh.play().catch(()=>{});

  document.querySelector('.universe.active').classList.remove('active');
  current = (current % 4) + 1;
  document.getElementById(`u${current}`).classList.add('active');
});

// Cursor
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// Init
createStars('stars1', 360);
createStars('stars2', 540);
createStars('stars3', 200);
createStars('stars4', 410);

createPlanets();

document.getElementById('famous-btn').addEventListener('click', openFamousModal);

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === "Escape") {
    closePlanetInfo();
    closeFamousModal();
  }
  if (e.key === " ") {
    document.dispatchEvent(new Event('click'));
  }
});
</script>

<style>
@keyframes twinkle {
  0% { opacity: 0.35; }
  100% { opacity: 1; }
}
</style>

</body>
</html>
